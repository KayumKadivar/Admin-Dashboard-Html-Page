<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNFC | Master - Privilege</title>

  <!-- Icons -->
  <script src="../js/vendor/phosphor-icons.min.js"></script>

  <!-- Theme & Utilities -->

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/modal-ui.css">
  <link rel="stylesheet" href="../css/pages/admin_dashboard.css">
  <link rel="stylesheet" href="../css/theme-vars.css">

  <!-- Core JS -->
  <script src="../js/vendor/jquery-3.7.1.min.js"></script>
  <script src="../js/vendor/sweetalert2.all.min.js"></script>
  <script src="../js/theme-control.js"></script>
  <script src="../js/sidebar.js"></script>

</head>

<body class="admin-dashboard-layout">
  <div class="app-layout-root">
    <!-- Main View -->
    <main class="app-main-view">
      <!-- Header -->
      <header class="app-header">
        <div class="app-header-group">
          <h1>Administrator</h1>
        </div>
        <div class="app-header-controls">
          <!-- Font Size Controls -->
          <div class="ui-control-set">
            <button id="fontDecreaseBtn" class="ui-btn-icon" title="Decrease Size">
              <i class="ph-bold ph-text-aa font-12px"></i>
            </button>
            <div class="ui-divider-v"></div>
            <button id="fontIncreaseBtn" class="ui-btn-icon" title="Increase Size">
              <i class="ph-bold ph-text-aa font-16px"></i>
            </button>
          </div>

          <!-- Theme Toggle -->
          <button id="themeToggleBtn" class="ui-btn-theme" title="Toggle Theme">
            <i id="themeIcon" class="ph ph-moon font-16px"></i>
          </button>

          <!-- Back -->
          <button id="adminBackBtn" class="ui-btn-pill">
            <i class="ph-bold ph-arrow-u-up-left"></i>
            <span>Back</span>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="app-content-area">
        <div id="adminContent">
          <!-- Static Content -->
          <div id="privilegeViewContainer">
            <div class="admin-card">
              <div class="admin-form-section">
                <div class="admin-form-section-header">
                  <div class="admin-form-section-icon icon-theme-purple">
                    <i class="ph-bold ph-plus-circle"></i>
                  </div>
                  <div>
                    <div class="admin-form-section-title">Add Privilege</div>
                    <div class="admin-form-section-desc">Add a new privilege group</div>
                  </div>
                </div>
                <div class="admin-form-section-body">
                  <div class="flex items-end gap-16px justify-start">
                    <div class="admin-field-group w-300px mb-0">
                      <label for="privilegeCodeInput" class="admin-field-label"><i class="ph ph-hash"></i> Code</label>
                      <input id="privilegeCodeInput" type="text" class="admin-input" placeholder="Enter privilege code...">
                    </div>
                    <div class="admin-field-group w-300px mb-0">
                      <label for="privilegeNameInput" class="admin-field-label"><i class="ph ph-text-aa"></i> Name</label>
                      <input id="privilegeNameInput" type="text" class="admin-input" placeholder="Enter privilege name...">
                    </div>
                    <button id="privilegeAddBtn" type="button" class="admin-btn admin-btn-primary">
                      <i class="ph ph-plus-circle"></i> Add
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Simplified In-Page Results Section -->
            <div id="privilegeResultsSection" class="admin-card mt-24px">
              <div class="admin-form-section-header mb-16px">
                <div class="admin-form-section-icon icon-theme-primary-alt">
                  <i class="ph-bold ph-list-bullets"></i>
                </div>
                <div>
                  <div class="admin-form-section-title">Privilege List</div>
                  <div class="admin-form-section-desc">All Privilege Groups</div>
                </div>
              </div>
              <div class="admin-table-scroll">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th class="admin-table-head-cell">Code</th>
                      <th class="admin-table-head-cell">Name</th>
                      <th class="admin-table-head-cell text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="privilegeTableBody">
                    <tr class="admin-table-row">
                      <td class="admin-table-cell font-semibold">1</td>
                      <td class="admin-table-cell">Tech</td>
                      <td class="admin-table-cell text-center">
                        <div class="admin-table-actions">
                          <button type="button" class="admin-action-btn edit-btn" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                          <button type="button" class="admin-action-btn delete-btn" title="Delete"><i class="ph ph-trash"></i></button>
                        </div>
                      </td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell font-semibold">2</td>
                      <td class="admin-table-cell">IE/SIE</td>
                      <td class="admin-table-cell text-center">
                        <div class="admin-table-actions">
                          <button type="button" class="admin-action-btn edit-btn" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                          <button type="button" class="admin-action-btn delete-btn" title="Delete"><i class="ph ph-trash"></i></button>
                        </div>
                      </td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell font-semibold">3</td>
                      <td class="admin-table-cell">M</td>
                      <td class="admin-table-cell text-center">
                        <div class="admin-table-actions">
                          <button type="button" class="admin-action-btn edit-btn" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                          <button type="button" class="admin-action-btn delete-btn" title="Delete"><i class="ph ph-trash"></i></button>
                        </div>
                      </td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell font-semibold">4</td>
                      <td class="admin-table-cell">SM</td>
                      <td class="admin-table-cell text-center">
                        <div class="admin-table-actions">
                          <button type="button" class="admin-action-btn edit-btn" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                          <button type="button" class="admin-action-btn delete-btn" title="Delete"><i class="ph ph-trash"></i></button>
                        </div>
                      </td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell font-semibold">12</td>
                      <td class="admin-table-cell">CM</td>
                      <td class="admin-table-cell text-center">
                        <div class="admin-table-actions">
                          <button type="button" class="admin-action-btn edit-btn" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                          <button type="button" class="admin-action-btn delete-btn" title="Delete"><i class="ph ph-trash"></i></button>
                        </div>
                      </td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell font-semibold">13</td>
                      <td class="admin-table-cell">AGM</td>
                      <td class="admin-table-cell text-center">
                        <div class="admin-table-actions">
                          <button type="button" class="admin-action-btn edit-btn" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                          <button type="button" class="admin-action-btn delete-btn" title="Delete"><i class="ph ph-trash"></i></button>
                        </div>
                      </td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell font-semibold">14</td>
                      <td class="admin-table-cell">GM</td>
                      <td class="admin-table-cell text-center">
                        <div class="admin-table-actions">
                          <button type="button" class="admin-action-btn edit-btn" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                          <button type="button" class="admin-action-btn delete-btn" title="Delete"><i class="ph ph-trash"></i></button>
                        </div>
                      </td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell font-semibold">15</td>
                      <td class="admin-table-cell">HOD</td>
                      <td class="admin-table-cell text-center">
                        <div class="admin-table-actions">
                          <button type="button" class="admin-action-btn edit-btn" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                          <button type="button" class="admin-action-btn delete-btn" title="Delete"><i class="ph ph-trash"></i></button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Back Button
    function goBack() {
      window.location.href = "admin_dashboard.html";
    }

    $(function () {
      // --- Privilege Logic ---
      const PrivilegeManager = (() => {
        'use strict';

        // Bind Events
        function bind() {

          // Back Button
          $('#adminBackBtn').on('click', goBack);

          // Add Privilege
          $('#privilegeAddBtn').on('click', function () {
            const code = $('#privilegeCodeInput').val().trim();
            const name = $('#privilegeNameInput').val().trim();

            // Empty Fields Alert
            if (!code || !name) {
              Swal.fire({
                icon: 'warning',
                title: 'Empty Fields',
                text: 'Please fill both Code and Name fields.',
                background: 'var(--app-panel, #181b1f)',
                color: 'var(--app-text, #ffffff)',
                confirmButtonColor: 'var(--typo-blue, #5794F2)'
              });
              return;
            }

            // Add Privilege Alert
            Swal.fire({
              icon: 'success',
              title: 'Added!',
              text: 'Privilege has been added successfully.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
            $('#privilegeCodeInput').val('');
            $('#privilegeNameInput').val('');

          });

          // Delete Logic (Row-level)
          $(document).on('click', '.delete-btn', function (e) {
            e.stopPropagation(); // Prevent click bubbles
            const row = $(this).closest('tr');
            const code = row.find('td:first-child').text().trim(); // Get Code from first cell
            
            // Delete Confirmation Alert
            Swal.fire({
              title: 'Are you sure?',
              text: "Do you want to delete Privilege Code: " + code + "?",
              icon: 'warning',
              showCancelButton: true,
              confirmButtonColor: '#F2495C',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)'
            }).then((result) => {
              if (result.isConfirmed) {
                row.remove();
                Swal.fire({
                  icon: 'success',
                  title: 'Deleted!',
                  text: 'Privilege has been removed.',
                  background: 'var(--app-panel, #181b1f)',
                  color: 'var(--app-text, #ffffff)',
                  confirmButtonColor: 'var(--typo-blue, #5794F2)'
                });
              }
            });
          });

          // Edit Logic (Open Modal)
          let activeRow = null;

          // Edit Button
          $(document).on('click', '.edit-btn', function (e) {
            e.stopPropagation();
            activeRow = $(this).closest('tr');
            const code = activeRow.find('td:nth-child(1)').text().trim();
            const name = activeRow.find('td:nth-child(2)').text().trim();

            $('#editCodeInput').val(code);
            $('#editNameInput').val(name);
            $('#editErrorMsg').hide();

            $('#editPrivilegeModal').addClass('is-open');
          });

          // Close Modal
          $('#closeEditModal, #cancelEditModal').on('click', function () {
            $('#editPrivilegeModal').removeClass('is-open');
          });

          // Update Click
          $('#updatePrivilegeBtn').on('click', function () {
            const newCode = $('#editCodeInput').val().trim();
            const newName = $('#editNameInput').val().trim();

            // Empty Fields Alert
            if (!newCode || !newName) {
              $('#editErrorMsg').show();
              return;
            }

            // Update Privilege
            if (activeRow) {
              activeRow.find('td:nth-child(1)').text(newCode);
              activeRow.find('td:nth-child(2)').text(newName);
              
              // Highlight row
              activeRow.addClass('updated-row-highlight');
              setTimeout(() => {
                 activeRow.removeClass('updated-row-highlight');
              }, 4000);
            }

            // Close Modal
            $('#editPrivilegeModal').removeClass('is-open');

            // Success Alert
            Swal.fire({
              icon: 'success',
              title: 'Updated!',
              text: 'Privilege updated successfully.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
          });
        }

        return { init: bind };
      })();

      // Initialize Privilege Manager
      PrivilegeManager.init();
    });
  </script>

  <!-- Edit Privilege Modal -->
  <div id="editPrivilegeModal" class="gnfc-modal-overlay">
    <div class="gnfc-modal-shell gnfc-modal-shell--narrow">

      <!-- Modal Header -->
      <div class="gnfc-modal-header">
        <div>
          <div class="gnfc-modal-title">Edit Privilege</div>
          <div class="gnfc-modal-subtitle">Update privilege details</div>
        </div>
        <button type="button" class="gnfc-modal-close" id="closeEditModal"><i class="ph ph-x"></i></button>
      </div>

      <!-- Modal Body -->
      <div class="gnfc-modal-body">
        <div class="admin-field-group mb-16px">
          <label for="editCodeInput" class="admin-field-label">Code</label>
          <input id="editCodeInput" type="text" class="admin-input">
        </div>
        <div class="admin-field-group">
          <label for="editNameInput" class="admin-field-label">Name</label>
          <input id="editNameInput" type="text" class="admin-input" placeholder="Enter new name...">
          <div id="editErrorMsg" style="color: #F2495C; font-size: 13px; margin-top: 4px; display: none;">Both fields are required</div>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="gnfc-modal-footer">
        <button type="button" class="gnfc-modal-btn gnfc-modal-btn-secondary" id="cancelEditModal">Cancel</button>
        <button type="button" class="gnfc-modal-btn gnfc-modal-btn-primary" id="updatePrivilegeBtn">Update</button>
      </div>
    </div>
  </div>
</body>

</html>
