<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNFC | Master - Privilege</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Theme & Utilities -->
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/modal-ui.css">
  <link rel="stylesheet" href="../css/pages/admin_dashboard.css">
  <link rel="stylesheet" href="../css/theme-vars.css">


  <!-- Core JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/theme-control.js"></script>
  <script src="../js/admin/admin_data.js"></script>
</head>

<body class="admin-dashboard-layout">
  <div class="app-layout-root">
    <!-- Main View -->
    <main class="app-main-view">
      <!-- Header -->
      <header class="app-header">
        <div class="app-header-group">
          <i class="ph ph-gear-six font-20px color-blue"></i>
          <h1 class="font-16px fw-bold color-primary ls-wide">Administrator</h1>
        </div>
        <div class="app-header-controls">
          <!-- Font Size Controls -->
          <div class="ui-control-set">
            <button id="fontDecreaseBtn" class="ui-btn-icon" title="Decrease Size">
              <i class="ph-bold ph-text-aa font-12px"></i>
            </button>
            <div class="ui-divider-v"></div>
            <button id="fontIncreaseBtn" class="ui-btn-icon" title="Increase Size">
              <i class="ph-bold ph-text-aa font-16px"></i>
            </button>
          </div>

          <!-- Theme Toggle -->
          <button id="themeToggleBtn" class="ui-btn-theme" title="Toggle Theme">
            <i id="themeIcon" class="ph ph-moon font-16px"></i>
          </button>

          <!-- Back -->
          <button id="adminBackBtn" class="ui-btn-pill">
            <i class="ph-bold ph-arrow-u-up-left"></i>
            <span>Back</span>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="app-content-area">
        <div id="adminContent">
          <!-- Static Top Bar -->
            <div class="app-header-group" style="margin-bottom: 20px;">
              <i class="ph ph-shield-check font-20px color-blue"></i>
              <h1 class="font-16px fw-bold color-primary ls-wide">Master - Privilege</h1>
            </div>

          <!-- Static Content -->
          <div id="privilegeViewContainer">
            <div class="admin-card">
              <div class="admin-form-section">
                <div class="admin-form-section-header">
                  <div class="admin-form-section-icon" style="background: rgba(183,148,244,0.12); color: #B794F4">
                    <i class="ph-bold ph-plus-circle"></i>
                  </div>
                  <div>
                    <div class="admin-form-section-title">Add Privilege</div>
                    <div class="admin-form-section-desc">Add a new privilege group</div>
                  </div>
                </div>
                <div class="admin-form-section-body">
                  <div class="admin-form-cols">
                    <div class="admin-field-group">
                      <label for="privilegeCodeInput" class="admin-field-label"><i class="ph ph-hash"></i> Code</label>
                      <input id="privilegeCodeInput" type="text" class="admin-input"
                        placeholder="Enter privilege code...">
                    </div>
                    <div class="admin-field-group">
                      <label for="privilegeNameInput" class="admin-field-label"><i class="ph ph-text-aa"></i>
                        Name</label>
                      <input id="privilegeNameInput" type="text" class="admin-input"
                        placeholder="Enter privilege name...">
                    </div>
                  </div>
                  <div class="admin-btn-row mt-16px" style="justify-content: flex-start">
                    <button id="privilegeAddBtn" type="button" class="admin-btn admin-btn-primary">
                      <i class="ph ph-plus-circle"></i> Add
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Simplified In-Page Results Section -->
            <div id="privilegeResultsSection" class="admin-card mt-24px">
              <div class="admin-form-section-header mb-16px">
                <div class="admin-form-section-icon" style="background: rgba(66,153,225,0.12); color: #4299E1">
                  <i class="ph-bold ph-list-bullets"></i>
                </div>
                <div>
                  <div class="admin-form-section-title">Privilege List</div>
                  <div class="admin-form-section-desc">All Privilege Groups</div>
                </div>
              </div>
              <div class="admin-table-scroll">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th class="admin-table-head-cell w-12 text-center">Sel</th>
                      <th class="admin-table-head-cell">Code</th>
                      <th class="admin-table-head-cell">Name</th>
                    </tr>
                  </thead>
                  <tbody id="privilegeTableBody">
                    <tr class="admin-table-row">
                      <td class="admin-table-cell text-center"><input type="radio" name="privilegeSelected" value="1" class="radio-input"></td>
                      <td class="admin-table-cell font-semibold">1</td>
                      <td class="admin-table-cell">Tech</td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell text-center"><input type="radio" name="privilegeSelected" value="2" class="radio-input"></td>
                      <td class="admin-table-cell font-semibold">2</td>
                      <td class="admin-table-cell">IE/SIE</td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell text-center"><input type="radio" name="privilegeSelected" value="3" class="radio-input"></td>
                      <td class="admin-table-cell font-semibold">3</td>
                      <td class="admin-table-cell">M</td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell text-center"><input type="radio" name="privilegeSelected" value="4" class="radio-input"></td>
                      <td class="admin-table-cell font-semibold">4</td>
                      <td class="admin-table-cell">SM</td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell text-center"><input type="radio" name="privilegeSelected" value="12" class="radio-input"></td>
                      <td class="admin-table-cell font-semibold">12</td>
                      <td class="admin-table-cell">CM</td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell text-center"><input type="radio" name="privilegeSelected" value="13" class="radio-input"></td>
                      <td class="admin-table-cell font-semibold">13</td>
                      <td class="admin-table-cell">AGM</td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell text-center"><input type="radio" name="privilegeSelected" value="14" class="radio-input"></td>
                      <td class="admin-table-cell font-semibold">14</td>
                      <td class="admin-table-cell">GM</td>
                    </tr>
                    <tr class="admin-table-row">
                      <td class="admin-table-cell text-center"><input type="radio" name="privilegeSelected" value="15" class="radio-input"></td>
                      <td class="admin-table-cell font-semibold">15</td>
                      <td class="admin-table-cell">HOD</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div class="admin-btn-row mt-16px">
                <button type="button" class="admin-btn admin-btn-danger" id="privilegeDeleteBtn">
                  <i class="ph ph-trash"></i> Delete Selected
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Back Button
    function goBack() {
      window.location.href = "admin_dashboard.html";
    }

    $(function () {
      // --- Privilege Logic ---
      const PrivilegeManager = (() => {
        'use strict';

        function bind() {
          $('#adminBackBtn').on('click', goBack);

          $('#privilegeAddBtn').on('click', function () {
            const code = $('#privilegeCodeInput').val().trim();
            const name = $('#privilegeNameInput').val().trim();

            if (!code || !name) {
              Swal.fire({
                icon: 'warning',
                title: 'Empty Fields',
                text: 'Please fill both Code and Name fields.',
                background: 'var(--app-panel, #181b1f)',
                color: 'var(--app-text, #ffffff)',
                confirmButtonColor: 'var(--typo-blue, #5794F2)'
              });
              return;
            }

            Swal.fire({
              title: 'Are you sure?',
              text: "Do you want to add Privilege: " + name + " (" + code + ")?",
              icon: 'question',
              showCancelButton: true,
              confirmButtonColor: 'var(--typo-blue, #5794F2)',
              cancelButtonColor: 'var(--app-border, #23272e)',
              confirmButtonText: 'Yes, add it!',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)'
            }).then((result) => {
              if (result.isConfirmed) {
                // Clear inputs
                $('#privilegeCodeInput').val('');
                $('#privilegeNameInput').val('');

                Swal.fire({
                  icon: 'success',
                  title: 'Added!',
                  text: 'Privilege has been added successfully.',
                  background: 'var(--app-panel, #181b1f)',
                  color: 'var(--app-text, #ffffff)',
                  confirmButtonColor: 'var(--typo-blue, #5794F2)'
                });
              }
            });
          });

          $('#privilegeDeleteBtn').on('click', function () {
            const $selected = $('input[name="privilegeSelected"]:checked');
            
            if ($selected.length === 0) {
              Swal.fire({
                icon: 'warning',
                title: 'No Selection',
                text: 'Please select a privilege row to delete.',
                background: 'var(--app-panel, #181b1f)',
                color: 'var(--app-text, #ffffff)',
                confirmButtonColor: 'var(--typo-blue, #5794F2)'
              });
              return;
            }

            const row = $selected.closest('tr');
            const code = $selected.val();

            Swal.fire({
              title: 'Are you sure?',
              text: "Do you want to delete Privilege Code: " + code + "?",
              icon: 'warning',
              showCancelButton: true,
              confirmButtonColor: '#F2495C', // Danger Red
              cancelButtonColor: 'var(--app-border, #23272e)',
              confirmButtonText: 'Yes, delete it!',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)'
            }).then((result) => {
              if (result.isConfirmed) {
                // Remove row from DOM (for visual static demo)
                row.remove();

                Swal.fire({
                  icon: 'success',
                  title: 'Deleted!',
                  text: 'Privilege has been removed.',
                  background: 'var(--app-panel, #181b1f)',
                  color: 'var(--app-text, #ffffff)',
                  confirmButtonColor: 'var(--typo-blue, #5794F2)'
                });
              }
            });
          });
        }

        return { init: bind };
      })();

      PrivilegeManager.init();
    });
  </script>
</body>

</html>
