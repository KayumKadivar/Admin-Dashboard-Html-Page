<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNFC | Master - User Plants</title>

  <!-- Icons -->
  <link rel="stylesheet" href="../css/phosphor.css">

  <!-- Theme & Utilities -->
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/modal-ui.css">
  <link rel="stylesheet" href="../css/pages/admin_dashboard.css">
  <link rel="stylesheet" href="../css/theme-vars.css">

  <!-- Core JS -->
  <script src="../js/vendor/jquery-3.7.1.min.js"></script>
  <script src="../js/vendor/sweetalert2.all.min.js"></script>
  <script src="../js/theme-control.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/admin/admin_data.js"></script>

</head>

<body class="admin-dashboard-layout">
  <div class="app-layout-root">

    <!-- Main View -->
    <main class="app-main-view">

      <!-- Header -->
      <header class="app-header">
        <div class="app-header-group">
          <h1>Administrator</h1>
        </div>
        <div class="app-header-controls">

          <!-- Font Size Controls -->
          <div class="ui-control-set">
            <button id="fontDecreaseBtn" class="ui-btn-icon" title="Decrease Size">
              <i class="ph-bold ph-text-aa font-12px"></i>
            </button>
            <div class="ui-divider-v"></div>
            <button id="fontIncreaseBtn" class="ui-btn-icon" title="Increase Size">
              <i class="ph-bold ph-text-aa font-16px"></i>
            </button>
          </div>

          <!-- Theme Toggle -->
          <button id="themeToggleBtn" class="ui-btn-theme" title="Toggle Theme">
            <i id="themeIcon" class="ph ph-moon font-16px"></i>
          </button>

          <!-- Back -->
          <button id="adminBackBtn" class="ui-btn-pill" title="Back">
            <i class="ph-bold ph-arrow-u-up-left"></i>
            <span>Back</span>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="app-content-area">
        <div id="adminContent">

          <!-- Select Employee Form Section -->
          <div class="admin-card">
            <div class="admin-form-section">
              <div class="admin-form-section-header">
                <div class="admin-form-section-icon" style="background: rgba(115,191,105,0.12); color: #73BF69">
                  <i class="ph-bold ph-user-focus"></i>
                </div>
                <div>
                  <div class="admin-form-section-title">Select Employee</div>
                  <div class="admin-form-section-desc">Choose a user to view and manage their assigned plant list</div>
                </div>
              </div>
              <div class="admin-form-section-body">
                <div class="flex items-end gap-16px justify-start">
                  <div class="admin-field-group">
                    <label for="userPlantsFilter" class="admin-field-label"><i class="ph ph-magnifying-glass"></i> Filter</label>
                    <input id="userPlantsFilter" type="text" class="admin-input" placeholder="Search by EC or Name...">
                  </div>
                  <div class="admin-field-group">
                    <label for="userPlantsSelect" class="admin-field-label"><i class="ph ph-identification-card"></i> EC Number</label>
                    <select id="userPlantsSelect" class="admin-select">
                      <option value="">Select EC Number</option>
                      <option value="10204">10204  Rahul Sharma  Tech</option>
                      <option value="10355">10355  Priya Patel  CM</option>
                      <option value="10892">10892  Amit Singh  SM</option>
                      <option value="11044">11044  Neha Desai  GM</option>
                      <option value="11289">11289  Rakesh Kumar  Tech</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Assigned Plants Results Section (Hidden Default) -->
          <div id="userPlantsResultsSection" class="admin-card mt-24px" style="display: none;">
            
            <!-- Header -->
            <div class="admin-form-section-header justify-between">
              <div class="flex items-center gap-12px">
                <div class="admin-form-section-icon icon-theme-primary bg-theme-primary">
                  <i class="ph-bold ph-tree"></i>
                </div>
                <div>
                  <div class="admin-form-section-title">User Plant Access</div>
                  <div class="admin-form-section-desc">Manage plant access and permissions</div>
                </div>
              </div>
              <div class="flex items-center gap-12px">
                <button type="button" id="saveUserPlantsBtnfir" class="admin-btn admin-btn-primary">
                  <i class="ph ph-floppy-disk"></i> Save Access
                </button>
              </div>
            </div>

            <!-- User Info Info Cards Grid -->
            <div class="info-stats-grid">
              <div class="info-stat-card">
                <div class="info-stat-icon bg-ec">
                  <i class="ph ph-identification-badge"></i>
                </div>
                <div class="info-stat-content">
                  <div class="info-stat-label">ECNo</div>
                  <div id="lblEc" class="info-stat-value">-</div>
                </div>
              </div>
              
              <div class="info-stat-card">
                <div class="info-stat-icon bg-user">
                  <i class="ph ph-user-focus"></i>
                </div>
                <div class="info-stat-content">
                  <div class="info-stat-label">UserName</div>
                  <div id="lblUser" class="info-stat-value">-</div>
                </div>
              </div>
              
              <div class="info-stat-card">
                <div class="info-stat-icon bg-group">
                  <i class="ph ph-users"></i>
                </div>
                <div class="info-stat-content">
                  <div class="info-stat-label">Group</div>
                  <div id="lblGroup" class="info-stat-value">-</div>
                </div>
              </div>
            </div>

            <!-- User Privilege Table -->
            <div class="admin-table-scroll">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th class="admin-table-head-cell">Plant</th>
                    <th class="admin-table-head-cell">Code</th>
                    <th class="admin-table-head-cell text-center" style="width: 15%">Assigned</th>
                  </tr>
                </thead>
                <tbody id="userPlantsTableBody">
                  <tr class="admin-table-row">
                    <td class="admin-table-cell font-15px fw-semibold">ACETIC ACID</td>
                    <td class="admin-table-cell">AA</td>
                    <td class="admin-table-cell text-center"><input type="checkbox" class="checkbox-input"></td>
                  </tr>
                  <tr class="admin-table-row">
                    <td class="admin-table-cell font-15px fw-semibold">AAQM</td>
                    <td class="admin-table-cell">AAQM</td>
                    <td class="admin-table-cell text-center"><input type="checkbox" class="checkbox-input"></td>
                  </tr>
                  <tr class="admin-table-row">
                    <td class="admin-table-cell font-15px fw-semibold">AMMONIA</td>
                    <td class="admin-table-cell">AMM</td>
                    <td class="admin-table-cell text-center"><input type="checkbox" class="checkbox-input"></td>
                  </tr>
                  <tr class="admin-table-row">
                    <td class="admin-table-cell font-15px fw-semibold">ANIP FILLING</td>
                    <td class="admin-table-cell">ANIPF</td>
                    <td class="admin-table-cell text-center"><input type="checkbox" class="checkbox-input"></td>
                  </tr>
                  <tr class="admin-table-row">
                    <td class="admin-table-cell font-15px fw-semibold">ANITDI</td>
                    <td class="admin-table-cell">ANITDI</td>
                    <td class="admin-table-cell text-center"><input type="checkbox" class="checkbox-input"></td>
                  </tr>
                  <tr class="admin-table-row">
                    <td class="admin-table-cell font-15px fw-semibold">BOILER</td>
                    <td class="admin-table-cell">BOILER</td>
                    <td class="admin-table-cell text-center"><input type="checkbox" class="checkbox-input" checked></td>
                  </tr>
                  <tr class="admin-table-row">
                    <td class="admin-table-cell font-15px fw-semibold">BAGGING</td>
                    <td class="admin-table-cell">BAGG</td>
                    <td class="admin-table-cell text-center"><input type="checkbox" class="checkbox-input"></td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Footer -->
            <div class="admin-form-section-footer">
              <button type="button" id="saveUserPlantsBtnsec" class="admin-btn admin-btn-primary mt-20px">
                <i class="ph ph-floppy-disk"></i> Save Access
              </button>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script>
    const UserPlantsView = (() => {
      'use strict';

      // Back button
      $('#adminBackBtn').on('click', function () {
        window.location.href = 'admin_dashboard.html';
      });

      function init() {
        const originalOptions = $('#userPlantsSelect option').not('[value=""]').toArray().map(opt => ({
          val: opt.value,
          text: $(opt).text()
        }));

        // Filter Dropdown
        $('#userPlantsFilter').on('input', function () {
          const query = $(this).val().toLowerCase().trim();
          const select = $('#userPlantsSelect');
          select.empty();
          select.append('<option value="">Select EC Number</option>');

          if (!query) {
            originalOptions.forEach(opt => select.append(`<option value="${opt.val}">${opt.text}</option>`));
          } else {
            originalOptions.forEach(opt => {
              if (opt.text.toLowerCase().includes(query)) {
                select.append(`<option value="${opt.val}">${opt.text}</option>`);
              }
            });
          }
        });

        // Select Change Trigger Auto-Load
        $('#userPlantsSelect').on('change', function () {
          const val = $(this).val();
          if (!val) {
            $('#userPlantsResultsSection').hide();
            return;
          }

          const text = $(this).find('option:selected').text().trim();
          const parts = text.split(/\s+/); 

          if (parts.length >= 2) {
            $('#lblEc').text(parts[0]);
            if (parts.length >= 3) {
               $('#lblGroup').text(parts[parts.length - 1]);
               const nameParts = parts.slice(1, -1);
               $('#lblUser').text(nameParts.join(' '));
            } else {
               // 2 parts: EC and Name
               $('#lblUser').text(parts[1]);
               $('#lblGroup').text('-');
            }
          }

          loadFakeUserPlantsData(val);
          $('#userPlantsResultsSection').show();
        });

        function loadFakeUserPlantsData(ec) {
          // Uncheck all except BOILER for demo setup trigger flows
          $('#userPlantsTableBody input[type="checkbox"]').prop('checked', false);
          
          if (ec === '10204') {
             $('#userPlantsTableBody tr').eq(0).find('input').prop('checked', true); // ACETIC ACID
             $('#userPlantsTableBody tr').eq(2).find('input').prop('checked', true); // AMMONIA
          } else if (ec === '10355') {
             $('#userPlantsTableBody tr').eq(1).find('input').prop('checked', true); // AAQM
             $('#userPlantsTableBody tr').eq(3).find('input').prop('checked', true); // ANIP FILLING
          } else {
             $('#userPlantsTableBody tr').eq(5).find('input').prop('checked', true); // BOILER (Default check)
          }
        }

        // Save Click
        $('#saveUserPlantsBtnfir, #saveUserPlantsBtnsec').on('click', function () {
          Swal.fire({
            icon: 'success',
            title: 'Saved',
            text: 'Plant access permissions saved successfully.',
            background: 'var(--app-panel, #181b1f)',
            color: 'var(--app-text, #ffffff)',
            confirmButtonColor: 'var(--typo-blue, #5794F2)'
          });
        });
      }

      return { init };
    })();

    $(function () {
      UserPlantsView.init();
    });
  </script>
</body>

</html>
