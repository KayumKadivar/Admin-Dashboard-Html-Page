<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNFC | Master - Modules</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Theme & Utilities -->
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/modal-ui.css">
  <link rel="stylesheet" href="../css/pages/admin_dashboard.css">
  <link rel="stylesheet" href="../css/theme-vars.css">

  <!-- Core JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/theme-control.js"></script>
  <script src="../js/sidebar.js"></script>
</head>

<body class="admin-dashboard-layout">
  <div class="app-layout-root">
    <!-- Main View -->
    <main class="app-main-view">
      <!-- Header -->
      <header class="app-header">
        <div class="app-header-group">
          <!-- <i class="ph ph-gear-six"></i> -->
          <h1>Administrator</h1>
        </div>
        <div class="app-header-controls">
          <!-- Font Size Controls -->
          <div class="ui-control-set">
            <button id="fontDecreaseBtn" class="ui-btn-icon" title="Decrease Size">
              <i class="ph-bold ph-text-aa font-12px"></i>
            </button>
            <div class="ui-divider-v"></div>
            <button id="fontIncreaseBtn" class="ui-btn-icon" title="Increase Size">
              <i class="ph-bold ph-text-aa font-16px"></i>
            </button>
          </div>

          <!-- Theme Toggle -->
          <button id="themeToggleBtn" class="ui-btn-theme" title="Toggle Theme">
            <i id="themeIcon" class="ph ph-moon font-16px"></i>
          </button>

          <!-- Back -->
          <button id="adminBackBtn" class="ui-btn-pill" onclick="window.location.href='admin_dashboard.html'">
            <i class="ph-bold ph-arrow-u-up-left"></i>
            <span>Back</span>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="app-content-area">
        <div id="adminContent">


          <!-- Static Content -->
          <div id="modulesViewContainer">
            <!-- Add / Search Module Form Section -->
            <div class="admin-card">
              <div class="admin-form-section">
                <div class="admin-form-section-header">
                  <div class="admin-form-section-icon" style="background: rgba(255,153,0,0.12); color: #FF9900">
                    <i class="ph-bold ph-plus-circle"></i>
                  </div>
                  <div>
                    <div class="admin-form-section-title">Add Module</div>
                    <div class="admin-form-section-desc">Add a new system module to the registry</div>
                  </div>
                </div>
                <div class="admin-form-section-body flex items-end gap-16px">
                  <div class="admin-field-group w-400px">
                    <label for="moduleMasterNameInput" class="admin-field-label"><i class="ph ph-puzzle-piece"></i>
                      Module Name</label>
                    <input id="moduleMasterNameInput" type="text" class="admin-input"
                      placeholder="Enter module name...">
                  </div>
                  <button id="moduleMasterAddBtn" type="button" class="admin-btn admin-btn-primary">
                    <i class="ph ph-plus-circle"></i> Add
                  </button>
                </div>
              </div>
            </div>

            <!-- Simplified In-Page Results Section -->
            <div id="modulesResultsSection" class="admin-card mt-24px">
              <div class="admin-form-section-header mb-16px">
                <div class="admin-form-section-icon" style="background: rgba(66,153,225,0.12); color: #4299E1">
                  <i class="ph-bold ph-list-bullets"></i>
                </div>
                <div>
                  <div class="admin-form-section-title">Module List</div>
                  <div class="admin-form-section-desc">All System Modules</div>
                </div>
              </div>
              <div class="admin-table-scroll">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th class="admin-table-head-cell">Module Name</th>
                      <th class="admin-table-head-cell text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="modulesTableBody">
                    <!-- Loaded dynamically -->
                  </tbody>
                </table>
              </div>
              <!-- Removed bulk delete button -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    $(function () {

      // Row click selects radio
      $('.admin-table-row').on('click', function (e) {
        if ($(e.target).is('input[type="radio"]')) return;
        $(this).find('input[type="radio"]').prop('checked', true);
      });

      // Add logic
      $('#moduleMasterAddBtn').on('click', function () {
        const name = $('#moduleMasterNameInput').val().trim();

        if (!name) {
          Swal.fire({
            icon: 'warning',
            title: 'Empty Field',
            text: 'Please fill the Module Name.',
            background: 'var(--app-panel, #181b1f)',
            color: 'var(--app-text, #ffffff)'
          });
          return;
        }

        Swal.fire({
          icon: 'success',
          title: 'Added',
          text: 'Module "' + name + '" added successfully.',
          background: 'var(--app-panel, #181b1f)',
          color: 'var(--app-text, #ffffff)'
        });
        $('#moduleMasterNameInput').val('');
      });

      // Delete logic
      $('#moduleDeleteBtn').on('click', function () {
        const selected = $('input[name="moduleSelected"]:checked');
        if (!selected.length) {
          Swal.fire({
            icon: 'warning',
            title: 'No Selection',
            text: 'Please select a module to delete.',
            background: 'var(--app-panel, #181b1f)',
            color: 'var(--app-text, #ffffff)'
          });
          return;
        }

        Swal.fire({
          title: 'Are you sure?',
          text: "You won't be able to revert this!",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#E53E3E',
          background: 'var(--app-panel, #181b1f)',
          color: 'var(--app-text, #ffffff)'
        }).then((result) => {
          if (result.isConfirmed) {
            selected.closest('tr').remove();
            Swal.fire({
              icon: 'success',
              title: 'Deleted',
              text: 'The plant has been deleted.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)'
            });;
          }
        });
      });
    });
  </script>
</body>

</html>
