  <script>
    $(function () {
      // --- User Logic ---
      const UserManager = (() => {
        'use strict';

        function bind() {
          // Add User
          $('#userInfoAddBtn').on('click', function () {
            const ec = $('#userInfoEc').val().trim();
            const name = $('#userInfoName').val().trim();

            if (!ec || !name) {
              Swal.fire({
                icon: 'warning',
                title: 'Empty Fields',
                text: 'Please fill both EC Number and Name.',
                background: 'var(--app-panel, #181b1f)',
                color: 'var(--app-text, #ffffff)',
                confirmButtonColor: 'var(--typo-blue, #5794F2)'
              });
              return;
            }

            Swal.fire({
              icon: 'success',
              title: 'Added!',
              text: 'User added successfully.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
            $('#userInfoEc').val('');
            $('#userInfoName').val('');
            $('#userInfoPassword').val('');
            $('#userInfoGroup').prop('selectedIndex', 0);
          });

          // Delete Logic (Row-level)
          $(document).on('click', '.delete-btn', function (e) {
            e.stopPropagation();
            const row = $(this).closest('tr');
            const ec = row.find('td:first-child').text().trim();

            Swal.fire({
              title: 'Are you sure?',
              text: "Do you want to delete User EC: " + ec + "?",
              icon: 'warning',
              showCancelButton: true,
              confirmButtonColor: '#F2495C',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)'
            }).then((result) => {
              if (result.isConfirmed) {
                row.remove();
                Swal.fire({
                  icon: 'success',
                  title: 'Deleted!',
                  text: 'User has been removed.',
                  background: 'var(--app-panel, #181b1f)',
                  color: 'var(--app-text, #ffffff)',
                  confirmButtonColor: 'var(--typo-blue, #5794F2)'
                });
              }
            });
          });

          // Edit Logic (Open Modal)
          let activeRow = null;

          $(document).on('click', '.edit-btn', function (e) {
            e.stopPropagation();
            activeRow = $(this).closest('tr');
            const ec = activeRow.find('td:nth-child(1)').text().trim();
            const name = activeRow.find('td:nth-child(2)').text().trim();
            const group = activeRow.find('td:nth-child(3)').text().trim();

            $('#editUserEcInput').val(ec);
            $('#editUserNameInput').val(name);
            $('#editUserGroupSelect').val(group).change();

            $('#editUserErrorMsg').hide();
            $('#editUserModal').addClass('is-open');
          });

          // Close Modal
          $('#closeEditUserModal, #cancelEditUserModal').on('click', function () {
            $('#editUserModal').removeClass('is-open');
          });

          // Update Click
          $('#updateUserBtn').on('click', function () {
            const newEc = $('#editUserEcInput').val().trim();
            const newName = $('#editUserNameInput').val().trim();
            const newGroup = $('#editUserGroupSelect').val();

            if (!newEc || !newName) {
              $('#editUserErrorMsg').show();
              return;
            }

            if (activeRow) {
              activeRow.find('td:nth-child(1)').text(newEc);
              activeRow.find('td:nth-child(2)').text(newName);
              activeRow.find('td:nth-child(3)').text(newGroup || '-');

              activeRow.addClass('updated-row-highlight');
              setTimeout(() => {
                activeRow.removeClass('updated-row-highlight');
              }, 4000);
            }

            $('#editUserModal').removeClass('is-open');

            Swal.fire({
              icon: 'success',
              title: 'Updated!',
              text: 'User updated successfully.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
          });
        }

        return { init: bind };
      })();

      UserManager.init();
    });
  </script>

  <!-- Edit User Modal -->
  <div id="editUserModal" class="gnfc-modal-overlay">

        <div class="admin-field-group mb-0">

          <select id="editUserGroupSelect" class="admin-select">
            <option value="Tech">Tech</option>
            <option value="IE/SIE">IE/SIE</option>
            <option value="M">M</option>
            <option value="SM">SM</option>
            <option value="CM">CM</option>
            <option value="AGM">AGM</option>
            <option value="GM">GM</option>
            <option value="IED">IED</option>
            <option value="GAT">GAT</option>
            <option value="DAT">DAT</option>
            <option value="GUEST">GUEST</option>
            <option value="VISITOR">VISITOR</option>
            <option value="TS">TS</option>
            <option value="CLAB">CLAB</option>
            <option value="R&D">R&D</option>
            <option value="IAT">IAT</option>
            <option value="OVS">OVS</option>
            <option value="PURCHASE">PURCHASE</option>
          </select>
          <div id="editUserErrorMsg" style="color: #F2495C; font-size: 13px; margin-top: 4px; display: none;">Both EC Number and Name are required</div>
        </div>
      </div>

      <div class="gnfc-modal-footer">
        <button type="button" class="gnfc-modal-btn gnfc-modal-btn-secondary" id="cancelEditUserModal">Cancel</button>
        <button type="button" class="gnfc-modal-btn gnfc-modal-btn-primary" id="updateUserBtn">Update</button>
      </div>
    </div>
  </div>
