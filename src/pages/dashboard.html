  <!-- Initialization -->
  <script>
    $(function () {
      // --- Inline Utilities ---
      function getStoredValue(key, fallbackValue) {
        try {
          const value = localStorage.getItem(key);
          return value == null ? fallbackValue : value;
        } catch (e) { return fallbackValue; }
      }

      function getStoredJsonValue(key, fallbackValue) {
        const raw = getStoredValue(key, '');
        if (!raw) return fallbackValue;
        try { return JSON.parse(raw); } catch (e) { return fallbackValue; }
      }

      // Hydrate stored data
      const storedPopup = getStoredValue(AdminData.STORAGE_KEYS.LOGIN_POPUP, 'no');
      AdminData.adminLoginPopupSelection = storedPopup === 'yes' ? 'yes' : 'no';

      AdminData.whatsNewContent = getStoredValue(
        AdminData.STORAGE_KEYS.WHATS_NEW,
        AdminData.DEFAULT_WHATS_NEW_TEXT
      );

      AdminData.mailScheduleRows = getStoredJsonValue(
        AdminData.STORAGE_KEYS.MAIL_SCHEDULE,
        AdminData.DEFAULT_MAIL_SCHEDULE_ROWS
      );

      // Init sidebar & load first view
      if (typeof initAdminSidebar === 'function') {
        initAdminSidebar();
      }
      
      // Load initial dashboard content
      if (typeof window.renderAdminContent === 'function') {
        window.renderAdminContent('dashboard');
      }

      $('#adminBackBtn').on('click', () => {
        window.location.href = '../../index.html';
      });
    });
  </script>
