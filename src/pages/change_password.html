<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNFC | Master - Change Password</title>

  <!-- Icons -->
  <link rel="stylesheet" href="../css/phosphor.css">

  <!-- Theme & Utilities -->
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/modal-ui.css">
  <link rel="stylesheet" href="../css/pages/admin_dashboard.css">
  <link rel="stylesheet" href="../css/theme-vars.css">

  <!-- Core JS -->
  <script src="../js/vendor/jquery-3.7.1.min.js"></script>
  <script src="../js/vendor/sweetalert2.all.min.js"></script>
  <script src="../js/theme-control.js"></script>
  <script src="../js/sidebar.js"></script>

</head>

<body class="admin-dashboard-layout">
  <div class="app-layout-root">

    <!-- Main View -->
    <main class="app-main-view">

      <!-- Header -->
      <header class="app-header">
        <div class="app-header-group">
          <h1>Administrator</h1>
        </div>
        <div class="app-header-controls">

          <!-- Font Size Controls -->
          <div class="ui-control-set">
            <button id="fontDecreaseBtn" class="ui-btn-icon" title="Decrease Size">
              <i class="ph-bold ph-text-aa font-16px"></i>
            </button>
            <div class="ui-divider-v"></div>
            <button id="fontIncreaseBtn" class="ui-btn-icon" title="Increase Size">
              <i class="ph-bold ph-text-aa font-16px"></i>
            </button>
          </div>

          <!-- Theme Toggle -->
          <button id="themeToggleBtn" class="ui-btn-theme" title="Toggle Theme">
            <i id="themeIcon" class="ph ph-moon font-16px"></i>
          </button>

          <!-- Back -->
          <button id="adminBackBtn" class="ui-btn-pill" title="Back">
            <i class="ph-bold ph-arrow-u-up-left"></i>
            <span>Back</span>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="app-content-area">
        <div id="adminContent">

          <!-- Static Content -->
          <div id="changePasswordViewContainer">

            <!-- Change Password Form Section -->
            <div class="admin-card">
              <div class="admin-form-section">
                <div class="admin-form-section-header">
                  <div class="admin-form-section-icon" style="background: rgba(255,153,0,0.12); color: #FF9900">
                    <i class="ph-bold ph-key"></i>
                  </div>
                  <div>
                    <div class="admin-form-section-title">Change Password For Admin</div>
                    <div class="admin-form-section-desc">Update the admin account password securely</div>
                  </div>
                </div>
                <div class="admin-form-section-body">
                  <div style="max-width: 500px">
                    <div class="admin-field-group mb-16px">
                      <label class="admin-field-label"><i class="ph ph-user"></i> User</label>
                      <input type="text" value="admin" readonly class="admin-input opacity-60">
                    </div>
                    <div class="admin-field-group mb-16px">
                      <label for="adminOldPassword" class="admin-field-label"><i class="ph ph-lock-key"></i> Old Password</label>
                      <input id="adminOldPassword" type="password" class="admin-input" placeholder="Enter current password...">
                    </div>
                    <div class="admin-field-group mb-16px">
                      <label for="adminNewPassword" class="admin-field-label"><i class="ph ph-lock"></i> New Password</label>
                      <input id="adminNewPassword" type="password" class="admin-input" placeholder="Enter new password...">
                    </div>
                    <div class="admin-field-group">
                      <label for="adminConfirmPassword" class="admin-field-label"><i class="ph ph-check-circle"></i> Confirm New Password</label>
                      <input id="adminConfirmPassword" type="password" class="admin-input" placeholder="Re-enter new password...">
                    </div>
                  </div>
                  <div class="admin-btn-row mt-24px">
                    <button id="adminChangeSubmitBtn" type="button" class="admin-btn admin-btn-primary">
                      <i class="ph ph-check-circle"></i> Submit
                    </button>
                    <button id="adminChangeResetBtn" type="button" class="admin-btn admin-btn-secondary">
                      <i class="ph ph-arrow-counter-clockwise"></i> Reset
                    </button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const ChangePasswordView = (() => {
      'use strict';

      // Back button
      $('#adminBackBtn').on('click', function () {
        window.location.href = 'admin_dashboard.html';
      });

      function init() {
        const $oldPass = $('#adminOldPassword');
        const $newPass = $('#adminNewPassword');
        const $confirmPass = $('#adminConfirmPassword');

        const clearForm = () => {
          $oldPass.val('');
          $newPass.val('');
          $confirmPass.val('');
          $oldPass.trigger('focus');
        };

        $('#adminChangeSubmitBtn').on('click', function () {
          const oldValue = $oldPass.val().trim();
          const newValue = $newPass.val().trim();
          const confirmValue = $confirmPass.val().trim();

          if (!oldValue) {
            Swal.fire({
              icon: 'warning',
              title: 'Empty Field',
              text: 'Please enter your current password.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
            $oldPass.trigger('focus');
            return;
          }
          if (!newValue) {
            Swal.fire({
              icon: 'warning',
              title: 'Empty Field',
              text: 'Please enter your new password.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
            $newPass.trigger('focus');
            return;
          }
          if (!confirmValue) {
            Swal.fire({
              icon: 'warning',
              title: 'Empty Field',
              text: 'Please confirm your new password.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
            $confirmPass.trigger('focus');
            return;
          }
          if (newValue !== confirmValue) {
            Swal.fire({
              icon: 'error',
              title: 'Mismatch',
              text: 'New passwords do not match.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
            $confirmPass.trigger('focus');
            return;
          }

          Swal.fire({
            icon: 'success',
            title: 'Updated!',
            text: 'Password updated successfully.',
            background: 'var(--app-panel, #181b1f)',
            color: 'var(--app-text, #ffffff)',
            confirmButtonColor: 'var(--typo-blue, #5794F2)'
          });
          clearForm();
        });

        $('#adminChangeResetBtn').on('click', clearForm);
      }

      return { init };
    })();

    $(function () {
      ChangePasswordView.init();
    });
  </script>
</body>

</html>
