<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNFC | Master - User Email</title>

  <!-- Icons -->
  <link rel="stylesheet" href="../css/phosphor.css">

  <!-- Theme & Utilities -->
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/modal-ui.css">
  <link rel="stylesheet" href="../css/pages/admin_dashboard.css">
  <link rel="stylesheet" href="../css/theme-vars.css">

  <!-- Core JS -->
  <script src="../js/vendor/jquery-3.7.1.min.js"></script>
  <script src="../js/vendor/sweetalert2.all.min.js"></script>
  <script src="../js/theme-control.js"></script>
  <script src="../js/sidebar.js"></script>

</head>

<body class="admin-dashboard-layout">
  <div class="app-layout-root">

    <!-- Main View -->
    <main class="app-main-view">

      <!-- Header -->
      <header class="app-header">
        <div class="app-header-group">
          <h1>Administrator</h1>
        </div>
        <div class="app-header-controls">

          <!-- Font Size Controls -->
          <div class="ui-control-set">
            <button id="fontDecreaseBtn" class="ui-btn-icon" title="Decrease Size">
              <i class="ph-bold ph-text-aa font-16px"></i>
            </button>
            <div class="ui-divider-v"></div>
            <button id="fontIncreaseBtn" class="ui-btn-icon" title="Increase Size">
              <i class="ph-bold ph-text-aa font-16px"></i>
            </button>
          </div>

          <!-- Theme Toggle -->
          <button id="themeToggleBtn" class="ui-btn-theme" title="Toggle Theme">
            <i id="themeIcon" class="ph ph-moon font-16px"></i>
          </button>

          <!-- Back -->
          <button id="adminBackBtn" class="ui-btn-pill" title="Back">
            <i class="ph-bold ph-arrow-u-up-left"></i>
            <span>Back</span>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="app-content-area">
        <div id="adminContent">

          <!-- Static Content -->
          <div id="userEmailViewContainer">

            <!-- Select Employee Form Section -->
            <div class="admin-card">
              <div class="admin-form-section">
                <div class="admin-form-section-header">
                  <div class="admin-form-section-icon icon-theme-primary ">
                    <i class="ph-bold ph-user-focus"></i>
                  </div>
                  <div>
                    <div class="admin-form-section-title">Select Employee</div>
                    <div class="admin-form-section-desc">Search and select a user to update their email</div>
                  </div>
                </div>
                <div class="admin-form-section-body">
                  <div class="admin-form-cols">
                    <div class="admin-field-group">
                      <label for="userEmailFilter" class="admin-field-label"><i class="ph ph-magnifying-glass"></i>
                        Filter</label>
                      <input id="userEmailFilter" type="text" class="admin-input" placeholder="Search by EC or Name...">
                    </div>
                    <div class="admin-field-group">
                      <label for="userEmailSelect" class="admin-field-label"><i class="ph ph-identification-card"></i>
                        EC Number</label>
                      <select id="userEmailSelect" class="admin-select">
                        <option value="">Select EC Number</option>
                        <option value="10204">10204 Rahul Sharma Tech</option>
                        <option value="10355">10355 Priya Patel CM</option>
                        <option value="10892">10892 Amit Singh SM</option>
                        <option value="11044">11044 Neha Desai GM</option>
                        <option value="11289">11289 Rakesh Kumar Tech</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- Email Address Form Section -->
            <div id="userEmailFormSection" class="admin-card mt-24px" style="display: none;">
              <div class="admin-form-section">
                <div class="admin-form-section-header">
                  <div class="admin-form-section-icon icon-theme-emerald">
                    <i class="ph-bold ph-envelope-simple"></i>
                  </div>
                  <div>
                    <div class="admin-form-section-title">Email Address</div>
                    <div class="admin-form-section-desc">Enter or update the email for the selected user</div>
                  </div>
                </div>
                <!-- User Info Info Cards Grid  -->
                <div id="userEmailInfoGrid" class="info-stats-grid mt-24px">
                  <div class="info-stat-card">
                    <div class="info-stat-icon bg-ec">
                      <i class="ph ph-identification-badge"></i>
                    </div>
                    <div class="info-stat-content">
                      <div class="info-stat-label">ECNo</div>
                      <div id="lblEc" class="info-stat-value">-</div>
                    </div>
                  </div>

                  <div class="info-stat-card">
                    <div class="info-stat-icon bg-user">
                      <i class="ph ph-user-focus"></i>
                    </div>
                    <div class="info-stat-content">
                      <div class="info-stat-label">UserName</div>
                      <div id="lblUser" class="info-stat-value">-</div>
                    </div>
                  </div>

                  <div class="info-stat-card">
                    <div class="info-stat-icon bg-group">
                      <i class="ph ph-users"></i>
                    </div>
                    <div class="info-stat-content">
                      <div class="info-stat-label">Group</div>
                      <div id="lblGroup" class="info-stat-value">-</div>
                    </div>
                  </div>
                </div>
                <div class="admin-form-section-body">
                  <div class="admin-field-group">
                    <label for="userEmailInput" class="admin-field-label"><i class="ph ph-at"></i> Email</label>
                    <input id="userEmailInput" type="email" class="admin-input" placeholder="Enter email address...">
                  </div>
                  <div class="admin-btn-row mt-16px">
                    <button id="userEmailUpdateBtn" type="button" class="admin-btn admin-btn-primary">
                      <i class="ph ph-floppy-disk"></i> Update
                    </button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const UserEmailView = (() => {
      'use strict';

      // Back button
      $('#adminBackBtn').on('click', function () {
        window.location.href = 'admin_dashboard.html';
      });

      function init() {
        const originalOptions = $('#userEmailSelect option').not('[value=""]').toArray().map(opt => ({
          val: opt.value,
          text: $(opt).text()
        }));

        // Filter Dropdown
        $('#userEmailFilter').on('input', function () {
          const query = $(this).val().toLowerCase().trim();
          const select = $('#userEmailSelect');
          select.empty();
          select.append('<option value="">Select EC Number</option>');

          if (!query) {
            originalOptions.forEach(opt => select.append(`<option value="${opt.val}">${opt.text}</option>`));
          } else {
            originalOptions.forEach(opt => {
              if (opt.text.toLowerCase().includes(query)) {
                select.append(`<option value="${opt.val}">${opt.text}</option>`);
              }
            });
          }
        });

        // Select Change Trigger
        $('#userEmailSelect').on('change', function () {
          const val = $(this).val();
          if (!val) {
            $('#userEmailInfoGrid, #userEmailFormSection').hide();
            return;
          }

          const text = $(this).find('option:selected').text().trim();
          const parts = text.split(/\s+/);

          if (parts.length >= 2) {
            $('#lblEc').text(parts[0]);
            
            if (parts.length >= 3) {
              const group = parts[parts.length - 1];
              const nameParts = parts.slice(1, -1);
              const name = nameParts.join(' ');
              
              $('#lblUser').text(name);
              $('#lblGroup').text(group);
              
              const cleanName = name.toLowerCase().replace(/\s+/g, '.');
              $('#userEmailInput').val(`${cleanName}@gnfc.in`);
            } else {
              $('#lblUser').text(parts[1]);
              $('#lblGroup').text('-');
              $('#userEmailInput').val(`${parts[1].toLowerCase()}@gnfc.in`);
            }
          }

          $('#userEmailInfoGrid, #userEmailFormSection').show();
        });

        // Update Click
        $('#userEmailUpdateBtn').on('click', function () {
          const email = $('#userEmailInput').val().trim();
          if (!email) {
            Swal.fire({
              icon: 'warning',
              title: 'Empty Field',
              text: 'Please enter a valid email address.',
              background: 'var(--app-panel, #181b1f)',
              color: 'var(--app-text, #ffffff)',
              confirmButtonColor: 'var(--typo-blue, #5794F2)'
            });
            return;
          }

          Swal.fire({
            icon: 'success',
            title: 'Updated!',
            text: 'User email updated successfully.',
            background: 'var(--app-panel, #181b1f)',
            color: 'var(--app-text, #ffffff)',
            confirmButtonColor: 'var(--typo-blue, #5794F2)'
          });
        });
      }

      return { init };
    })();

    $(function () {
      UserEmailView.init();
    });
  </script>
</body>

</html>
